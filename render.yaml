services:
  - type: web
    name: smart-metro-incident-management
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: metro-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://metro-s-1.onrender.com

databases:
  - name: metro-db
    databaseName: metro
    region: ohio
    plan: free
    ipAllowList: []
